exclude = [
  "**/*__pycache__",
  "**/*egg-info",
  "**/build",
  "**/dist",
  "**/docs",
  "**/tests",
  "**/venv",
]
source_roots = ["src"]
root_module = "forbid"
forbid_circular_dependencies = true
layers_explicit_depends_on = true

[[modules]]
path = "codex_usage_tracker"
depends_on = ["codex_usage_tracker.core"]

[[modules]]
path = "codex_usage_tracker.__main__"
depends_on = ["codex_usage_tracker.cli"]

[[modules]]
path = "codex_usage_tracker.allowance"
depends_on = ["codex_usage_tracker.pricing"]

[[modules]]
path = "codex_usage_tracker.mcp_server"
depends_on = ["codex_usage_tracker.cli"]

[[modules]]
path = "codex_usage_tracker.plugin_installer"
depends_on = ["codex_usage_tracker.cli"]

[[modules]]
path = "codex_usage_tracker.support"
depends_on = ["codex_usage_tracker.reports"]

[[modules]]
path = "codex_usage_tracker.store.allowance_materialization"
depends_on = ["codex_usage_tracker.allowance_intelligence"]

[[modules]]
path = "codex_usage_tracker.store.api"
depends_on = [
  "codex_usage_tracker.allowance_intelligence",
  "codex_usage_tracker.core",
  "codex_usage_tracker.store",
]

[[modules]]
path = "codex_usage_tracker.dashboard_service"
depends_on = []
