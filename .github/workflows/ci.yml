name: CI

on:
  push:
  pull_request:

jobs:
  hardening:
    name: Hardening gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          npm ci
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          cargo install taplo-cli --version 0.9.0 --locked
      - name: Agent Maintainer guidance drift
        run: python -m agent_maintainer guidance --check
      - name: Maintained Pyright surface
        run: |
          python -m pyright \
            src/codex_usage_tracker/cli/main.py \
            src/codex_usage_tracker/context/reader.py
      - name: GitHub Actions lint
        run: actionlint .github/workflows/*.yml
      - name: Secret scan
        run: gitleaks dir --no-banner --redact=100 --report-format json --report-path /tmp/gitleaks.json .
      - name: Markdown lint
        run: npx markdownlint-cli2
      - name: YAML lint
        run: yamllint .github .yamllint
      - name: TOML format
        run: taplo fmt --check pyproject.toml tach.toml
      - name: Workflow schema validation
        run: |
          check-jsonschema \
            --builtin-schema vendor.github-workflows \
            .github/workflows/ci.yml \
            .github/workflows/pricing-compat.yml \
            .github/workflows/publish.yml

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - uses: actions/setup-node@v4
        if: matrix.python-version == '3.14'
        with:
          node-version: "22"
      - name: Ruff
        if: matrix.python-version == '3.14'
        run: python -m ruff check .
      - name: Type check
        if: matrix.python-version == '3.14'
        run: python -m mypy
      - name: Test
        run: python -m pytest
      - name: Coverage
        if: matrix.python-version == '3.14'
        run: python -m pytest --cov=codex_usage_tracker --cov-report=term-missing
      - name: Compile
        run: python -m compileall src
      - name: Dashboard JavaScript syntax
        if: matrix.python-version == '3.14'
        run: |
          for file in src/codex_usage_tracker/plugin_data/dashboard/dashboard*.js; do
            node --check "$file"
          done
      - name: Release readiness
        run: python scripts/check_release.py
      - name: Whitespace
        run: git diff --check

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Verify built wheel
        run: python scripts/check_release.py --dist
