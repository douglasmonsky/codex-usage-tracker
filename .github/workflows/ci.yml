name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dashboard-quality:
    name: Dashboard quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
      - name: Install dashboard tooling
        run: npm ci
      - name: Dashboard lint
        run: npm run dashboard:lint
      - name: Dashboard type check
        run: npm run dashboard:typecheck
      - name: Dashboard tests
        run: npm run dashboard:test
      - name: Dashboard build
        run: npm run dashboard:build
      - name: Dashboard governance
        run: npm run dashboard:governance
      - name: Dashboard bundle budget
        run: node scripts/check-dashboard-bundles.mjs

  python-hardening:
    name: Python hardening
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install Python tooling
        env:
          AGENT_MAINTAINER_SHA: 1129570a725256dcc5f04bee33cdc32c35af911d
          AGENT_MAINTAINER_URL: git+https://github.com/douglasmonsky/agent-maintainer.git
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m pip install --force-reinstall --no-deps \
            "agent-maintainer @ ${AGENT_MAINTAINER_URL}@${AGENT_MAINTAINER_SHA}"
      - name: Agent Maintainer guidance drift
        run: python -m agent_maintainer guidance --check
      - name: Whole-source Pyright
        run: python -m pyright --pythonpath "$(command -v python)" src
      - name: Dependency hygiene
        run: deptry .
      - name: Dead code
        run: vulture src tests config/vulture-whitelist.py
      - name: Python security
        run: python -m agent_maintainer.runners.bandit

  repository-policy:
    name: Repository policy and security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: actions/cache@v5
        with:
          path: |
            ~/go/bin/actionlint
            ~/go/bin/gitleaks
            ~/.cargo/bin/taplo
          key: hardening-tools-actionlint-1.7.12-gitleaks-8.30.1-taplo-0.9.0
      - name: Install policy tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          npm ci
          command -v actionlint >/dev/null || go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          command -v gitleaks >/dev/null || go install github.com/zricethezav/gitleaks/v8@v8.30.1
          command -v taplo >/dev/null || cargo install taplo-cli --version 0.9.0 --locked
      - name: Dependency vulnerabilities
        run: pip-audit -r requirements/audit.txt
      - name: Workflow security
        run: zizmor --offline --no-progress .github/workflows
      - name: GitHub Actions lint
        run: actionlint .github/workflows/*.yml
      - name: Secret scan
        run: gitleaks dir --no-banner --redact=100 --report-format json --report-path /tmp/gitleaks.json .
      - name: Markdown lint
        run: npx markdownlint-cli2
      - name: YAML lint
        run: yamllint .github .yamllint
      - name: TOML format
        run: taplo fmt --check pyproject.toml tach.toml
      - name: Workflow schema validation
        run: |
          check-jsonschema \
            --builtin-schema vendor.github-workflows \
            .github/workflows/allowance-statistical-calibration.yml \
            .github/workflows/ci.yml \
            .github/workflows/pricing-compat.yml \
            .github/workflows/publish.yml
          check-jsonschema \
            --builtin-schema vendor.dependabot \
            .github/dependabot.yml

  dashboard-route-budget:
    name: Dashboard route budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install benchmark tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Dashboard route performance budget
        run: |
          python scripts/benchmark_dashboard_routes.py \
            --sizes 100000 \
            --iterations 3 \
            --skip-compression \
            --enforce-thresholds \
            --output-dir /tmp/dashboard-route-budget

  hardening:
    name: Hardening gates
    needs: [dashboard-quality, python-hardening, repository-policy, dashboard-route-budget]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm hardening gates passed
        run: echo "All parallel hardening gates passed."

  dashboard-visualization:
    name: Dashboard visualization contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
      - name: Install dashboard tooling
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Visualization renderer budget
        run: npm run dashboard:visualization-bundle
      - name: Visualization browser contracts
        run: npm run dashboard:visualization-smoke
      - name: Upload visualization evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-visualization-evidence
          path: test-results/**/*.png
          if-no-files-found: warn
          retention-days: 14

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - uses: actions/setup-node@v6.4.0
        if: matrix.python-version == '3.14'
        with:
          node-version: "22"
      - name: Ruff
        if: matrix.python-version == '3.14'
        run: python -m ruff check .
      - name: Type check
        if: matrix.python-version == '3.14'
        run: python -m mypy
      - name: Test
        run: python -m pytest
      - name: Coverage
        if: matrix.python-version == '3.14'
        run: python -m pytest --cov=codex_usage_tracker --cov-report=term-missing
      - name: Compile
        run: python -m compileall src
      - name: Dashboard JavaScript syntax
        if: matrix.python-version == '3.14'
        run: |
          for file in src/codex_usage_tracker/plugin_data/dashboard/dashboard*.js; do
            node --check "$file"
          done
      - name: Release readiness
        run: python scripts/check_release.py
      - name: Whitespace
        run: git diff --check

  package:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Verify built wheel
        run: python scripts/check_release.py --dist
