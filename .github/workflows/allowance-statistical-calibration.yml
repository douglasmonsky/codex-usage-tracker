name: Allowance statistical calibration

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"
  push:
    branches: [main]
    paths:
      - "src/codex_usage_tracker/allowance_intelligence/**"
      - "scripts/calibrate_allowance_change_detector.py"
      - "tests/allowance_intelligence/test_change_calibration.py"
      - ".github/workflows/allowance-statistical-calibration.yml"
  pull_request:
    paths:
      - "src/codex_usage_tracker/allowance_intelligence/**"
      - "scripts/calibrate_allowance_change_detector.py"
      - "tests/allowance_intelligence/test_change_calibration.py"
      - ".github/workflows/allowance-statistical-calibration.yml"

permissions:
  contents: read

concurrency:
  group: allowance-calibration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  calibrate:
    name: Family-wise false-positive calibration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Calibrate allowance change detector
        run: |
          python scripts/calibrate_allowance_change_detector.py \
            --simulations 1000 \
            --permutations 1999 \
            --json | tee allowance-statistical-calibration.json
      - name: Upload calibration evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: allowance-statistical-calibration
          path: allowance-statistical-calibration.json
          if-no-files-found: error
          retention-days: 30
